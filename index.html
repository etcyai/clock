<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時鐘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  body {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
  }

  .time {
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: clamp(60px, 15vw, 220px);
    font-weight: 700;
    letter-spacing: 4px;
    line-height: 1;
    z-index: 1;
  }

  .date-line {
    margin-top: clamp(16px, 4vw, 36px);
    color: #fff;
    opacity: 0.55;
    font-size: clamp(11px, 2vw, 16px);
    letter-spacing: 2px;
    font-weight: 300;
    z-index: 1;
  }

  /* ===== 左側感應區（滑鼠移過去才會出現） ===== */
  .dock-wrapper {
    position: fixed;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 130px;
    height: 220px;
    z-index: 6;
    display: flex;
    align-items: center;
  }

  .hint {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 56px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.18);
    transition: opacity 0.3s ease;
  }

  .dock-wrapper:hover .hint {
    opacity: 0;
  }

  /* ===== 合併長條玻璃工具列 ===== */
  .dock {
    position: absolute;
    left: 18px;
    display: flex;
    flex-direction: column;
    width: 74px;
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.16);
    box-shadow:
      inset 0 1px 1px rgba(255, 255, 255, 0.35),
      inset 0 -1px 6px rgba(255, 255, 255, 0.04),
      0 10px 30px rgba(0, 0, 0, 0.4);
    overflow: hidden;
    opacity: 0;
    transform: translateX(-16px);
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .dock-wrapper:hover .dock {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  .segment {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 16px 6px;
    cursor: pointer;
    transition: background 0.2s ease;
    color: rgba(255, 255, 255, 0.85);
  }

  .segment:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
  }

  .segment.active {
    background: rgba(255, 255, 255, 0.16);
    color: #fff;
  }

  .segment svg {
    width: 19px;
    height: 19px;
    display: block;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
  }

  .segment .label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    opacity: 0.9;
    white-space: nowrap;
  }

  .divider {
    height: 1px;
    margin: 0 12px;
    background: rgba(255, 255, 255, 0.12);
  }

  /* ===== 工具面板（碼表 / 計時器 / 番茄鐘） ===== */
  .panel {
    position: fixed;
    left: clamp(100px, 10vw, 118px);
    top: 50%;
    width: clamp(230px, 26vw, 280px);
    padding: 14px 22px 26px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.09);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow:
      inset 0 1px 1px rgba(255, 255, 255, 0.4),
      inset 0 -1px 8px rgba(255, 255, 255, 0.05),
      0 12px 40px rgba(0, 0, 0, 0.4);
    z-index: 4;
    opacity: 0;
    transform: translateY(-50%) scale(0.95);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  .panel.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(-50%) scale(1);
  }

  .panel.dragging {
    transition: none;
  }

  .drag-handle {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 20px;
    margin-bottom: 6px;
    cursor: grab;
    touch-action: none;
  }

  .drag-handle:active {
    cursor: grabbing;
  }

  .drag-handle .grip {
    display: flex;
    gap: 4px;
  }

  .drag-handle .grip span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.35);
  }

  .panel-close {
    position: absolute;
    top: 14px;
    right: 16px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    opacity: 0.5;
    font-size: 12px;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .panel-close:hover {
    opacity: 0.9;
  }

  .panel-title {
    color: #fff;
    font-size: 13px;
    opacity: 0.5;
    letter-spacing: 2px;
    font-weight: 300;
    margin-bottom: 14px;
    text-align: center;
  }

  .panel-display {
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: clamp(34px, 4vw, 42px);
    font-weight: 600;
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 18px;
  }

  .panel-sub {
    color: #fff;
    opacity: 0.5;
    font-size: 12px;
    text-align: center;
    margin-top: -12px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .panel-buttons {
    display: flex;
    gap: 10px;
  }

  .pill-btn {
    flex: 1;
    height: 44px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.35);
    transition: background 0.2s ease, transform 0.15s ease;
  }

  .pill-btn:hover {
    background: rgba(255, 255, 255, 0.18);
  }

  .pill-btn:active {
    transform: scale(0.95);
  }

  .pill-btn.primary {
    background: rgba(255, 255, 255, 0.85);
    color: #111;
  }

  .pill-btn.primary:hover {
    background: rgba(255, 255, 255, 1);
  }

  .timer-adjust {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 18px;
  }

  .timer-adjust .adj-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .timer-adjust .adj-btn:hover {
    background: rgba(255, 255, 255, 0.18);
  }
</style>
</head>
<body>

  <div class="time" id="timeEl">00:00</div>
  <div class="date-line" id="dateLine"></div>

  <!-- 左側感應區：滑鼠移過去才顯示工具列 -->
  <div class="dock-wrapper">
    <div class="hint"></div>
    <div class="dock">
      <div class="segment" data-target="stopwatch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="13" r="8"></circle>
          <line x1="12" y1="13" x2="12" y2="9"></line>
          <line x1="12" y1="13" x2="15" y2="15.2"></line>
          <line x1="10" y1="2.5" x2="14" y2="2.5"></line>
          <line x1="12" y1="3" x2="12" y2="5.5"></line>
        </svg>
        <span class="label">碼表</span>
      </div>
      <div class="divider"></div>
      <div class="segment" data-target="timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="7" y1="2.5" x2="17" y2="2.5"></line>
          <line x1="7" y1="21.5" x2="17" y2="21.5"></line>
          <path d="M7.5 2.5c0 4.2 3 6 4.5 7.8 -1.5 1.8 -4.5 3.6 -4.5 7.8"></path>
          <path d="M16.5 2.5c0 4.2 -3 6 -4.5 7.8 1.5 1.8 4.5 3.6 4.5 7.8"></path>
        </svg>
        <span class="label">計時器</span>
      </div>
      <div class="divider"></div>
      <div class="segment" data-target="pomodoro">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="14" r="7.2"></circle>
          <path d="M12 6.8c0-2.2 1.6-3.8 3.2-4.3"></path>
          <path d="M12 6.8c0-2.2 -1.6-3.8 -3.2-4.3"></path>
        </svg>
        <span class="label">番茄鐘</span>
      </div>
    </div>
  </div>

  <!-- 碼表面板 -->
  <div class="panel" id="panel-stopwatch">
    <div class="panel-close" data-close="stopwatch">✕</div>
    <div class="drag-handle"><div class="grip"><span></span><span></span><span></span></div></div>
    <div class="panel-title">碼表</div>
    <div class="panel-display" id="swDisplay">00:00.0</div>
    <div class="panel-buttons">
      <button class="pill-btn primary" id="swStart">開始</button>
      <button class="pill-btn" id="swReset">重置</button>
    </div>
  </div>

  <!-- 計時器面板 -->
  <div class="panel" id="panel-timer">
    <div class="panel-close" data-close="timer">✕</div>
    <div class="drag-handle"><div class="grip"><span></span><span></span><span></span></div></div>
    <div class="panel-title">計時器</div>
    <div class="panel-display" id="tmDisplay">05:00</div>
    <div class="timer-adjust" id="tmAdjust">
      <div class="adj-btn" data-delta="-60">−1</div>
      <div class="adj-btn" data-delta="60">+1</div>
    </div>
    <div class="panel-buttons">
      <button class="pill-btn primary" id="tmStart">開始</button>
      <button class="pill-btn" id="tmReset">重置</button>
    </div>
  </div>

  <!-- 番茄鐘面板 -->
  <div class="panel" id="panel-pomodoro">
    <div class="panel-close" data-close="pomodoro">✕</div>
    <div class="drag-handle"><div class="grip"><span></span><span></span><span></span></div></div>
    <div class="panel-title">番茄鐘</div>
    <div class="panel-display" id="pmDisplay">25:00</div>
    <div class="panel-sub" id="pmMode">專注時間</div>
    <div class="panel-buttons">
      <button class="pill-btn primary" id="pmStart">開始</button>
      <button class="pill-btn" id="pmReset">重置</button>
    </div>
  </div>

  <script>
    /* ===== 主時鐘 ===== */
    const timeEl = document.getElementById('timeEl');
    const dateLineEl = document.getElementById('dateLine');

    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      timeEl.textContent = `${h}:${m}`;

      const y = now.getFullYear();
      const mo = (now.getMonth() + 1).toString().padStart(2, '0');
      const d = now.getDate().toString().padStart(2, '0');
      dateLineEl.textContent = `${y} / ${mo} / ${d}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    /* ===== 工具切換邏輯 ===== */
    const segments = document.querySelectorAll('.segment');
    const panels = document.querySelectorAll('.panel');

    function openPanel(target) {
      segments.forEach(s => s.classList.toggle('active', s.dataset.target === target));
      panels.forEach(p => p.classList.toggle('open', p.id === 'panel-' + target));
    }

    function closeAllPanels() {
      segments.forEach(s => s.classList.remove('active'));
      panels.forEach(p => p.classList.remove('open'));
    }

    segments.forEach(seg => {
      seg.addEventListener('click', () => {
        const target = seg.dataset.target;
        const panel = document.getElementById('panel-' + target);
        const isOpen = panel.classList.contains('open');
        if (isOpen) {
          closeAllPanels();
        } else {
          openPanel(target);
        }
      });
    });

    document.querySelectorAll('.panel-close').forEach(btn => {
      btn.addEventListener('click', () => {
        closeAllPanels();
      });
    });

    /* ===== 面板拖曳 ===== */
    let dragState = { panel: null, offsetX: 0, offsetY: 0, dragging: false };

    document.querySelectorAll('.drag-handle').forEach(handle => {
      handle.addEventListener('pointerdown', (e) => {
        const panel = handle.closest('.panel');
        const rect = panel.getBoundingClientRect();
        panel.style.transform = 'none';
        panel.style.left = rect.left + 'px';
        panel.style.top = rect.top + 'px';
        panel.classList.add('dragging');
        dragState = {
          panel,
          offsetX: e.clientX - rect.left,
          offsetY: e.clientY - rect.top,
          dragging: true
        };
        handle.setPointerCapture(e.pointerId);
      });
    });

    document.addEventListener('pointermove', (e) => {
      if (!dragState.dragging) return;
      const panel = dragState.panel;
      let newLeft = e.clientX - dragState.offsetX;
      let newTop = e.clientY - dragState.offsetY;
      const maxLeft = window.innerWidth - panel.offsetWidth - 8;
      const maxTop = window.innerHeight - panel.offsetHeight - 8;
      newLeft = Math.min(Math.max(8, newLeft), maxLeft);
      newTop = Math.min(Math.max(8, newTop), maxTop);
      panel.style.left = newLeft + 'px';
      panel.style.top = newTop + 'px';
    });

    document.addEventListener('pointerup', () => {
      if (dragState.dragging) {
        dragState.panel.classList.remove('dragging');
      }
      dragState = { panel: null, dragging: false };
    });

    /* ===== 碼表 ===== */
    let swElapsed = 0;
    let swRunning = false;
    let swLast = 0;
    let swRAF = null;

    function formatStopwatch(ms) {
      const totalMs = Math.floor(ms);
      const minutes = Math.floor(totalMs / 60000);
      const seconds = Math.floor((totalMs % 60000) / 1000);
      const tenth = Math.floor((totalMs % 1000) / 100);
      return `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}.${tenth}`;
    }

    function swLoop(ts) {
      if (!swRunning) return;
      const delta = ts - swLast;
      swLast = ts;
      swElapsed += delta;
      document.getElementById('swDisplay').textContent = formatStopwatch(swElapsed);
      swRAF = requestAnimationFrame(swLoop);
    }

    document.getElementById('swStart').addEventListener('click', (e) => {
      swRunning = !swRunning;
      if (swRunning) {
        swLast = performance.now();
        swRAF = requestAnimationFrame(swLoop);
        e.target.textContent = '暫停';
      } else {
        cancelAnimationFrame(swRAF);
        e.target.textContent = '開始';
      }
    });

    document.getElementById('swReset').addEventListener('click', () => {
      swRunning = false;
      swElapsed = 0;
      cancelAnimationFrame(swRAF);
      document.getElementById('swDisplay').textContent = formatStopwatch(0);
      document.getElementById('swStart').textContent = '開始';
    });

    /* ===== 計時器 ===== */
    let tmTotal = 5 * 60;
    let tmRemaining = tmTotal;
    let tmRunning = false;
    let tmInterval = null;

    function formatTimer(sec) {
      const s = Math.max(0, Math.round(sec));
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m.toString().padStart(2,'0')}:${r.toString().padStart(2,'0')}`;
    }

    function renderTimer() {
      document.getElementById('tmDisplay').textContent = formatTimer(tmRemaining);
    }
    renderTimer();

    document.getElementById('tmAdjust').querySelectorAll('.adj-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (tmRunning) return;
        const delta = parseInt(btn.dataset.delta, 10);
        tmTotal = Math.max(60, tmTotal + delta);
        tmRemaining = tmTotal;
        renderTimer();
      });
    });

    document.getElementById('tmStart').addEventListener('click', (e) => {
      tmRunning = !tmRunning;
      if (tmRunning) {
        e.target.textContent = '暫停';
        tmInterval = setInterval(() => {
          tmRemaining -= 1;
          if (tmRemaining <= 0) {
            tmRemaining = 0;
            renderTimer();
            clearInterval(tmInterval);
            tmRunning = false;
            document.getElementById('tmStart').textContent = '開始';
            return;
          }
          renderTimer();
        }, 1000);
      } else {
        e.target.textContent = '開始';
        clearInterval(tmInterval);
      }
    });

    document.getElementById('tmReset').addEventListener('click', () => {
      tmRunning = false;
      clearInterval(tmInterval);
      tmRemaining = tmTotal;
      renderTimer();
      document.getElementById('tmStart').textContent = '開始';
    });

    /* ===== 番茄鐘 ===== */
    const FOCUS_TIME = 25 * 60;
    const BREAK_TIME = 5 * 60;
    let pmRemaining = FOCUS_TIME;
    let pmIsBreak = false;
    let pmRunning = false;
    let pmInterval = null;

    function renderPomodoro() {
      document.getElementById('pmDisplay').textContent = formatTimer(pmRemaining);
      document.getElementById('pmMode').textContent = pmIsBreak ? '休息時間' : '專注時間';
    }
    renderPomodoro();

    document.getElementById('pmStart').addEventListener('click', (e) => {
      pmRunning = !pmRunning;
      if (pmRunning) {
        e.target.textContent = '暫停';
        pmInterval = setInterval(() => {
          pmRemaining -= 1;
          if (pmRemaining <= 0) {
            pmIsBreak = !pmIsBreak;
            pmRemaining = pmIsBreak ? BREAK_TIME : FOCUS_TIME;
          }
          renderPomodoro();
        }, 1000);
      } else {
        e.target.textContent = '開始';
        clearInterval(pmInterval);
      }
    });

    document.getElementById('pmReset').addEventListener('click', () => {
      pmRunning = false;
      clearInterval(pmInterval);
      pmIsBreak = false;
      pmRemaining = FOCUS_TIME;
      renderPomodoro();
      document.getElementById('pmStart').textContent = '開始';
    });
  </script>

</body>
</html>
