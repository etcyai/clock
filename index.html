<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時鐘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  body {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
  }

  .time {
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: clamp(60px, 15vw, 220px);
    font-weight: 700;
    letter-spacing: 4px;
    line-height: 1;
    z-index: 1;
  }

  .date-line {
    margin-top: clamp(16px, 4vw, 36px);
    color: #fff;
    opacity: 0.55;
    font-size: clamp(11px, 2vw, 16px);
    letter-spacing: 2px;
    font-weight: 300;
    z-index: 1;
  }

  /* ===== 左側感應區 ===== */
  .dock-wrapper {
    position: fixed;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 130px;
    height: 220px;
    z-index: 6;
    display: flex;
    align-items: center;
  }

  .hint {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 56px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.18);
    transition: opacity 0.3s ease;
  }

  .dock-wrapper:hover .hint {
    opacity: 0;
  }

  .dock {
    position: absolute;
    left: 18px;
    display: flex;
    flex-direction: column;
    width: 74px;
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.16);
    box-shadow:
      inset 0 1px 1px rgba(255, 255, 255, 0.35),
      inset 0 -1px 6px rgba(255, 255, 255, 0.04),
      0 10px 30px rgba(0, 0, 0, 0.4);
    overflow: hidden;
    opacity: 0;
    transform: translateX(-16px);
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .dock-wrapper:hover .dock {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  .segment {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 16px 6px;
    cursor: pointer;
    transition: background 0.2s ease;
    color: rgba(255, 255, 255, 0.85);
  }

  .segment:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
  }

  .segment.active {
    background: rgba(255, 255, 255, 0.16);
    color: #fff;
  }

  .segment svg {
    width: 19px;
    height: 19px;
    display: block;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
  }

  .segment .label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    opacity: 0.9;
    white-space: nowrap;
  }

  .divider {
    height: 1px;
    margin: 0 12px;
    background: rgba(255, 255, 255, 0.12);
  }

  /* ===== 工具面板 ===== */
  .panel {
    position: fixed;
    left: clamp(100px, 10vw, 118px);
    top: 50%;
    width: clamp(250px, 28vw, 300px);
    padding: 14px 22px 26px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.09);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow:
      inset 0 1px 1px rgba(255, 255, 255, 0.4),
      inset 0 -1px 8px rgba(255, 255, 255, 0.05),
      0 12px 40px rgba(0, 0, 0, 0.4);
    z-index: 4;
    opacity: 0;
    transform: translateY(-50%) scale(0.95);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  .panel.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(-50%) scale(1);
  }

  .panel.dragging {
    transition: none;
  }

  .drag-handle {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 20px;
    margin-bottom: 6px;
    cursor: grab;
    touch-action: none;
  }

  .drag-handle:active {
    cursor: grabbing;
  }

  .drag-handle .grip {
    display: flex;
    gap: 4px;
  }

  .drag-handle .grip span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.35);
  }

  .panel-close {
    position: absolute;
    top: 14px;
    right: 16px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    opacity: 0.5;
    font-size: 12px;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .panel-close:hover {
    opacity: 0.9;
  }

  .panel-title {
    color: #fff;
    font-size: 13px;
    opacity: 0.5;
    letter-spacing: 2px;
    font-weight: 300;
    margin-bottom: 14px;
    text-align: center;
  }

  .panel-display {
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: clamp(28px, 3.4vw, 34px);
    font-weight: 600;
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .panel-sub {
    color: #fff;
    opacity: 0.5;
    font-size: 12px;
    text-align: center;
    margin-top: -8px;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }

  .panel-buttons {
    display: flex;
    gap: 10px;
  }

  .pill-btn {
    flex: 1;
    height: 44px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.35);
    transition: background 0.2s ease, transform 0.15s ease;
  }

  .pill-btn:hover {
    background: rgba(255, 255, 255, 0.18);
  }

  .pill-btn:active {
    transform: scale(0.95);
  }

  .pill-btn.primary {
    background: rgba(255, 255, 255, 0.85);
    color: #111;
  }

  .pill-btn.primary:hover {
    background: rgba(255, 255, 255, 1);
  }

  /* ===== iPhone 風格滾輪選擇器 ===== */
  .wheel-group {
    position: relative;
    margin: 4px 0 16px;
    max-height: 140px;
    opacity: 1;
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.25s ease, margin 0.3s ease;
  }

  .wheel-cols {
    display: flex;
    justify-content: center;
    gap: 6px;
    height: 108px;
    position: relative;
  }

  .wheel-col {
    width: 52px;
    height: 108px;
    overflow: hidden;
    position: relative;
    z-index: 1;
    cursor: grab;
    touch-action: none;
  }

  .wheel-col:active {
    cursor: grabbing;
  }

  .wheel-col.disabled {
    pointer-events: none;
    opacity: 0.45;
  }

  .wheel-track {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    will-change: transform;
  }

  .wheel-item {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    font-weight: 600;
    opacity: 0.3;
    will-change: opacity, transform;
  }

  .wheel-highlight {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 36px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.12);
    border-top: 1px solid rgba(255, 255, 255, 0.2);
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    pointer-events: none;
    z-index: 0;
  }

  .wheel-unit-labels {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 4px;
  }

  .wheel-unit-labels span {
    width: 52px;
    text-align: center;
    color: #fff;
    opacity: 0.4;
    font-size: 11px;
    letter-spacing: 1px;
  }

  /* 開始後收起設定區 */
  .panel.running .wheel-group {
    max-height: 0;
    opacity: 0;
    margin: 0;
    pointer-events: none;
  }

  .panel.running .mode-tabs {
    max-height: 0;
    opacity: 0;
    margin: 0;
    padding: 0;
    border-width: 0;
    pointer-events: none;
  }

  /* 番茄鐘：專注／休息切換分頁 */
  .mode-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    padding: 3px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    overflow: hidden;
    max-height: 40px;
    transition: max-height 0.3s ease, opacity 0.25s ease, margin 0.3s ease, padding 0.3s ease;
  }

  .mode-tab {
    flex: 1;
    text-align: center;
    padding: 7px 0;
    border-radius: 999px;
    color: #fff;
    opacity: 0.55;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s ease, opacity 0.2s ease;
    white-space: nowrap;
  }

  .mode-tab.active {
    background: rgba(255, 255, 255, 0.16);
    opacity: 1;
  }

  /* ===== 主題選單 ===== */
  .theme-options {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 4px;
  }

  .theme-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .theme-swatch {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    border: 2px solid rgba(255, 255, 255, 0.18);
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.35), 0 6px 16px rgba(0, 0, 0, 0.35);
    transition: border-color 0.2s ease, transform 0.15s ease;
  }

  .theme-option:hover .theme-swatch {
    transform: scale(1.05);
  }

  .theme-option.active .theme-swatch {
    border-color: #fff;
  }

  .theme-option span {
    color: #fff;
    opacity: 0.7;
    font-size: 11px;
    letter-spacing: 1px;
  }

  .theme-option.active span {
    opacity: 1;
  }

  .theme-swatch-default {
    background: #000;
  }

  .theme-swatch-sakura {
    background: linear-gradient(145deg, #ffffff 0%, #ffe6f2 50%, #ffbede 100%);
  }

  .theme-swatch-jungle {
    background: linear-gradient(145deg, #3d6b3f 0%, #16240f 60%, #06090a 100%);
  }

  /* ===== 叢林花瓣層（藤蔓 / 螢火蟲 / 霧氣） ===== */
  .jungle-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
    display: none;
  }

  body[data-theme="jungle"] .jungle-layer {
    display: block;
  }

  .jungle-mist {
    position: absolute;
    inset: -15%;
    background:
      radial-gradient(circle at 25% 30%, rgba(180, 220, 160, 0.08), transparent 40%),
      radial-gradient(circle at 75% 65%, rgba(140, 200, 130, 0.06), transparent 45%);
    filter: blur(30px);
    animation: jungle-mist-drift 34s ease-in-out infinite alternate;
  }

  @keyframes jungle-mist-drift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(4%, 3%); }
  }

  .vine {
    position: absolute;
    top: -10px;
    width: 150px;
    height: 62vh;
    opacity: 0.9;
    filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.55));
  }

  .vine-left {
    left: -14px;
  }

  .vine-right {
    right: -14px;
    transform: scaleX(-1);
  }

  .firefly {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, #f2ffb8 0%, #baf27a 45%, rgba(186, 242, 122, 0) 75%);
    box-shadow: 0 0 8px 2px rgba(210, 255, 140, 0.75);
    opacity: 0;
    animation-name: firefly-float;
    animation-timing-function: ease-in-out;
    animation-fill-mode: forwards;
  }

  @keyframes firefly-float {
    0% {
      transform: translate3d(0, 0, 0);
      opacity: 0;
    }
    15% {
      opacity: 0.9;
    }
    50% {
      transform: translate3d(var(--fx-mid, 20px), var(--fy-mid, -30px), 0);
      opacity: 0.45;
    }
    85% {
      opacity: 0.9;
    }
    100% {
      transform: translate3d(var(--fx-end, -15px), var(--fy-end, -60px), 0);
      opacity: 0;
    }
  }

  /* ===== 叢林主題配色（潮濕陰暗） ===== */
  body[data-theme="jungle"] {
    background: radial-gradient(circle at 30% 20%, #1b2b1a 0%, #10190f 55%, #060907 100%);
  }

  body[data-theme="jungle"] .time {
    color: #d9f2c4;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6), 0 0 22px rgba(160, 255, 120, 0.15);
  }

  body[data-theme="jungle"] .date-line {
    color: #9fc98a;
    opacity: 0.75;
  }

  body[data-theme="jungle"] .dock,
  body[data-theme="jungle"] .panel {
    background: rgba(14, 26, 13, 0.55);
    border-color: rgba(150, 200, 120, 0.22);
  }

  body[data-theme="jungle"] .hint {
    background: rgba(150, 200, 120, 0.25);
  }

  /* ===== 櫻花花瓣層 ===== */
  .petal-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
    display: none;
  }

  body[data-theme="sakura"] .petal-layer {
    display: block;
  }

  .petal {
    position: absolute;
    top: -20px;
    left: 0;
    border-radius: 0 100% 0 100%;
    background: radial-gradient(circle at 30% 30%, #ffffff, #ffeaf3 55%, #ffc2e0 100%);
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.7), 0 0 12px rgba(255, 194, 224, 0.5);
    opacity: 0;
    animation-name: petal-fall;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
  }

  @keyframes petal-fall {
    0% {
      transform: translate3d(0, -10vh, 0) rotate(0deg);
      opacity: 0;
    }
    8% {
      opacity: 0.9;
    }
    50% {
      transform: translate3d(var(--drift-mid, 30px), 55vh, 0) rotate(180deg);
    }
    92% {
      opacity: 0.85;
    }
    100% {
      transform: translate3d(var(--drift-end, -20px), 110vh, 0) rotate(360deg);
      opacity: 0;
    }
  }

  /* ===== 櫻花主題配色（白粉夢幻） ===== */
  body[data-theme="sakura"] {
    background: radial-gradient(circle at 25% 20%, #fffbfd 0%, #ffeef6 30%, #ffdcec 65%, #ffc9e2 100%);
  }

  body[data-theme="sakura"] .time {
    color: #7a2f52;
    text-shadow:
      0 1px 0 rgba(255, 255, 255, 0.9),
      0 2px 6px rgba(255, 255, 255, 0.9),
      0 4px 20px rgba(255, 255, 255, 0.7);
  }

  body[data-theme="sakura"] .date-line {
    color: #8a3d63;
    opacity: 0.85;
    text-shadow: 0 1px 4px rgba(255, 255, 255, 0.8);
  }

  body[data-theme="sakura"] .dock {
    background: rgba(122, 47, 82, 0.45);
    border-color: rgba(255, 255, 255, 0.3);
  }

  body[data-theme="sakura"] .panel {
    background: rgba(122, 47, 82, 0.45);
    border-color: rgba(255, 255, 255, 0.3);
  }

  body[data-theme="sakura"] .hint {
    background: rgba(122, 47, 82, 0.4);
  }
</style>
</head>
<body>

  <div class="time" id="timeEl">00:00</div>
  <div class="date-line" id="dateLine"></div>

  <!-- 櫻花花瓣層 -->
  <div class="petal-layer" id="petalLayer"></div>

  <!-- 叢林藤蔓/螢火蟲/霧氣層 -->
  <div class="jungle-layer" id="jungleLayer">
    <div class="jungle-mist"></div>
    <svg class="vine vine-left" viewBox="0 0 160 700" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M80 0 C 30 70, 130 150, 55 250 C 5 330, 140 410, 65 510 C 20 590, 110 650, 80 700"
        fill="none" stroke="#2f5233" stroke-width="9" stroke-linecap="round"/>
      <ellipse cx="35" cy="90" rx="20" ry="11" fill="#3d6b3f" transform="rotate(-30 35 90)"/>
      <ellipse cx="120" cy="180" rx="22" ry="12" fill="#345c37" transform="rotate(25 120 180)"/>
      <ellipse cx="25" cy="300" rx="20" ry="11" fill="#3d6b3f" transform="rotate(-15 25 300)"/>
      <ellipse cx="130" cy="400" rx="24" ry="13" fill="#2f5233" transform="rotate(20 130 400)"/>
      <ellipse cx="35" cy="520" rx="20" ry="11" fill="#345c37" transform="rotate(-25 35 520)"/>
      <ellipse cx="110" cy="610" rx="22" ry="12" fill="#3d6b3f" transform="rotate(15 110 610)"/>
    </svg>
    <svg class="vine vine-right" viewBox="0 0 160 700" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M80 0 C 30 70, 130 150, 55 250 C 5 330, 140 410, 65 510 C 20 590, 110 650, 80 700"
        fill="none" stroke="#2f5233" stroke-width="9" stroke-linecap="round"/>
      <ellipse cx="35" cy="90" rx="20" ry="11" fill="#3d6b3f" transform="rotate(-30 35 90)"/>
      <ellipse cx="120" cy="180" rx="22" ry="12" fill="#345c37" transform="rotate(25 120 180)"/>
      <ellipse cx="25" cy="300" rx="20" ry="11" fill="#3d6b3f" transform="rotate(-15 25 300)"/>
      <ellipse cx="130" cy="400" rx="24" ry="13" fill="#2f5233" transform="rotate(20 130 400)"/>
      <ellipse cx="35" cy="520" rx="20" ry="11" fill="#345c37" transform="rotate(-25 35 520)"/>
      <ellipse cx="110" cy="610" rx="22" ry="12" fill="#3d6b3f" transform="rotate(15 110 610)"/>
    </svg>
  </div>

  <!-- 左側感應區 -->
  <div class="dock-wrapper">
    <div class="hint"></div>
    <div class="dock">
      <div class="segment" data-target="stopwatch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="13" r="8"></circle>
          <line x1="12" y1="13" x2="12" y2="9"></line>
          <line x1="12" y1="13" x2="15" y2="15.2"></line>
          <line x1="10" y1="2.5" x2="14" y2="2.5"></line>
          <line x1="12" y1="3" x2="12" y2="5.5"></line>
        </svg>
        <span class="label">碼表</span>
      </div>
      <div class="divider"></div>
      <div class="segment" data-target="timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="7" y1="2.5" x2="17" y2="2.5"></line>
          <line x1="7" y1="21.5" x2="17" y2="21.5"></line>
          <path d="M7.5 2.5c0 4.2 3 6 4.5 7.8 -1.5 1.8 -4.5 3.6 -4.5 7.8"></path>
          <path d="M16.5 2.5c0 4.2 -3 6 -4.5 7.8 1.5 1.8 4.5 3.6 4.5 7.8"></path>
        </svg>
        <span class="label">計時器</span>
      </div>
      <div class="divider"></div>
      <div class="segment" data-target="pomodoro">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="14" r="7.2"></circle>
          <path d="M12 6.8c0-2.2 1.6-3.8 3.2-4.3"></path>
          <path d="M12 6.8c0-2.2 -1.6-3.8 -3.2-4.3"></path>
        </svg>
        <span class="label">番茄鐘</span>
      </div>
      <div class="divider"></div>
      <div class="segment" data-target="theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"></circle>
          <circle cx="12" cy="8" r="1.1" fill="currentColor" stroke="none"></circle>
          <circle cx="16" cy="12" r="1.1" fill="currentColor" stroke="none"></circle>
          <circle cx="12" cy="16" r="1.1" fill="currentColor" stroke="none"></circle>
          <circle cx="8" cy="12" r="1.1" fill="currentColor" stroke="none"></circle>
        </svg>
        <span class="label">主題</span>
      </div>
    </div>
  </div>

  <!-- 碼表面板 -->
  <div class="panel" id="panel-stopwatch">
    <div class="panel-close" data-close="stopwatch">✕</div>
    <div class="drag-handle"><div class="grip"><span></span><span></span><span></span></div></div>
    <div class="panel-title">碼表</div>
    <div class="panel-display" id="swDisplay">00:00.0</div>
    <div class="panel-buttons">
      <button class="pill-btn primary" id="swStart">開始</button>
      <button class="pill-btn" id="swReset">重置</button>
    </div>
  </div>

  <!-- 計時器面板 -->
  <div class="panel" id="panel-timer">
    <div class="panel-close" data-close="timer">✕</div>
    <div class="drag-handle"><div class="grip"><span></span><span></span><span></span></div></div>
    <div class="panel-title">計時器</div>
    <div class="panel-display" id="tmDisplay">00:05:00</div>

    <div class="wheel-group" id="tmWheelGroup">
      <div class="wheel-cols">
        <div class="wheel-highlight"></div>
        <div class="wheel-col" id="tmWheelH"></div>
        <div class="wheel-col" id="tmWheelM"></div>
        <div class="wheel-col" id="tmWheelS"></div>
      </div>
      <div class="wheel-unit-labels"><span>時</span><span>分</span><span>秒</span></div>
    </div>

    <div class="panel-buttons">
      <button class="pill-btn primary" id="tmStart">開始</button>
      <button class="pill-btn" id="tmReset">重置</button>
    </div>
  </div>

  <!-- 番茄鐘面板 -->
  <div class="panel" id="panel-pomodoro">
    <div class="panel-close" data-close="pomodoro">✕</div>
    <div class="drag-handle"><div class="grip"><span></span><span></span><span></span></div></div>
    <div class="panel-title">番茄鐘</div>
    <div class="panel-display" id="pmDisplay">00:25:00</div>
    <div class="panel-sub" id="pmMode">專注時間</div>

    <div class="mode-tabs" id="pmTabs">
      <div class="mode-tab active" data-mode="focus">專注設定</div>
      <div class="mode-tab" data-mode="break">休息設定</div>
    </div>

    <div class="wheel-group" id="pmWheelGroup">
      <div class="wheel-cols">
        <div class="wheel-highlight"></div>
        <div class="wheel-col" id="pmWheelH"></div>
        <div class="wheel-col" id="pmWheelM"></div>
        <div class="wheel-col" id="pmWheelS"></div>
      </div>
      <div class="wheel-unit-labels"><span>時</span><span>分</span><span>秒</span></div>
    </div>

    <div class="panel-buttons">
      <button class="pill-btn primary" id="pmStart">開始</button>
      <button class="pill-btn" id="pmReset">重置</button>
    </div>
  </div>

  <!-- 主題面板 -->
  <div class="panel" id="panel-theme">
    <div class="panel-close" data-close="theme">✕</div>
    <div class="drag-handle"><div class="grip"><span></span><span></span><span></span></div></div>
    <div class="panel-title">主題</div>
    <div class="theme-options">
      <div class="theme-option active" data-theme="default">
        <div class="theme-swatch theme-swatch-default"></div>
        <span>預設</span>
      </div>
      <div class="theme-option" data-theme="sakura">
        <div class="theme-swatch theme-swatch-sakura"></div>
        <span>櫻花</span>
      </div>
      <div class="theme-option" data-theme="jungle">
        <div class="theme-swatch theme-swatch-jungle"></div>
        <span>叢林</span>
      </div>
    </div>
  </div>

  <script>
    /* ===== 主時鐘 ===== */
    const timeEl = document.getElementById('timeEl');
    const dateLineEl = document.getElementById('dateLine');

    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      timeEl.textContent = `${h}:${m}`;

      const y = now.getFullYear();
      const mo = (now.getMonth() + 1).toString().padStart(2, '0');
      const d = now.getDate().toString().padStart(2, '0');
      dateLineEl.textContent = `${y} / ${mo} / ${d}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    /* ===== 工具切換邏輯 ===== */
    const segments = document.querySelectorAll('.segment');
    const panels = document.querySelectorAll('.panel');

    function openPanel(target) {
      segments.forEach(s => s.classList.toggle('active', s.dataset.target === target));
      panels.forEach(p => p.classList.toggle('open', p.id === 'panel-' + target));
    }

    function closeAllPanels() {
      segments.forEach(s => s.classList.remove('active'));
      panels.forEach(p => p.classList.remove('open'));
    }

    segments.forEach(seg => {
      seg.addEventListener('click', () => {
        const target = seg.dataset.target;
        const panel = document.getElementById('panel-' + target);
        const isOpen = panel.classList.contains('open');
        if (isOpen) {
          closeAllPanels();
        } else {
          openPanel(target);
        }
      });
    });

    document.querySelectorAll('.panel-close').forEach(btn => {
      btn.addEventListener('click', () => {
        closeAllPanels();
      });
    });

    /* ===== 面板拖曳 ===== */
    let dragState = { panel: null, offsetX: 0, offsetY: 0, dragging: false };

    document.querySelectorAll('.drag-handle').forEach(handle => {
      handle.addEventListener('pointerdown', (e) => {
        const panel = handle.closest('.panel');
        const rect = panel.getBoundingClientRect();
        panel.style.transform = 'none';
        panel.style.left = rect.left + 'px';
        panel.style.top = rect.top + 'px';
        panel.classList.add('dragging');
        dragState = {
          panel,
          offsetX: e.clientX - rect.left,
          offsetY: e.clientY - rect.top,
          dragging: true
        };
        handle.setPointerCapture(e.pointerId);
      });
    });

    document.addEventListener('pointermove', (e) => {
      if (!dragState.dragging) return;
      const panel = dragState.panel;
      let newLeft = e.clientX - dragState.offsetX;
      let newTop = e.clientY - dragState.offsetY;
      const maxLeft = window.innerWidth - panel.offsetWidth - 8;
      const maxTop = window.innerHeight - panel.offsetHeight - 8;
      newLeft = Math.min(Math.max(8, newLeft), maxLeft);
      newTop = Math.min(Math.max(8, newTop), maxTop);
      panel.style.left = newLeft + 'px';
      panel.style.top = newTop + 'px';
    });

    document.addEventListener('pointerup', () => {
      if (dragState.dragging) {
        dragState.panel.classList.remove('dragging');
      }
      dragState = { panel: null, dragging: false };
    });

    /* ===== 碼表 ===== */
    let swElapsed = 0;
    let swRunning = false;
    let swLast = 0;
    let swRAF = null;

    function formatStopwatch(ms) {
      const totalMs = Math.floor(ms);
      const minutes = Math.floor(totalMs / 60000);
      const seconds = Math.floor((totalMs % 60000) / 1000);
      const tenth = Math.floor((totalMs % 1000) / 100);
      return `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}.${tenth}`;
    }

    function swLoop(ts) {
      if (!swRunning) return;
      const delta = ts - swLast;
      swLast = ts;
      swElapsed += delta;
      document.getElementById('swDisplay').textContent = formatStopwatch(swElapsed);
      swRAF = requestAnimationFrame(swLoop);
    }

    document.getElementById('swStart').addEventListener('click', (e) => {
      swRunning = !swRunning;
      if (swRunning) {
        swLast = performance.now();
        swRAF = requestAnimationFrame(swLoop);
        e.target.textContent = '暫停';
      } else {
        cancelAnimationFrame(swRAF);
        e.target.textContent = '開始';
      }
    });

    document.getElementById('swReset').addEventListener('click', () => {
      swRunning = false;
      swElapsed = 0;
      cancelAnimationFrame(swRAF);
      document.getElementById('swDisplay').textContent = formatStopwatch(0);
      document.getElementById('swStart').textContent = '開始';
    });

    /* ===== 共用格式化 (HH:MM:SS) ===== */
    function formatHMS(totalSeconds) {
      const s = Math.max(0, Math.round(totalSeconds));
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const r = s % 60;
      return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${r.toString().padStart(2,'0')}`;
    }

    /* ===== iPhone 風格滾輪選擇器（transform 版本，避免原生捲動造成的卡頓） ===== */
    function buildWheelColumn(container, max, initial, onSettle) {
      const itemHeight = 36;
      container.innerHTML = '';

      const track = document.createElement('div');
      track.className = 'wheel-track';
      container.appendChild(track);

      const items = [];
      for (let i = 0; i <= max; i++) {
        const item = document.createElement('div');
        item.className = 'wheel-item';
        item.textContent = i.toString().padStart(2, '0');
        track.appendChild(item);
        items.push(item);
      }

      const maxPos = max * itemHeight;
      let position = initial * itemHeight;
      let dragging = false;
      let lastY = 0;
      let lastT = 0;
      let velocity = 0;
      let animRAF = null;
      let renderScheduled = false;
      let wheelSettleTimer = null;

      function clamp(p) {
        return Math.min(maxPos, Math.max(0, p));
      }

      function render() {
        renderScheduled = false;
        track.style.transform = `translateY(${itemHeight - position}px)`;
        const first = Math.max(0, Math.floor(position / itemHeight) - 4);
        const last = Math.min(max, Math.ceil(position / itemHeight) + 4);
        for (let i = first; i <= last; i++) {
          const dist = Math.abs(position - i * itemHeight);
          const item = items[i];
          item.style.opacity = Math.max(0.25, 1 - dist / 60);
          item.style.transform = `scale(${Math.max(0.8, 1 - dist / 240)})`;
        }
      }

      function scheduleRender() {
        if (renderScheduled) return;
        renderScheduled = true;
        requestAnimationFrame(render);
      }

      function currentIndex() {
        return Math.min(max, Math.max(0, Math.round(position / itemHeight)));
      }

      function cancelAnim() {
        if (animRAF) {
          cancelAnimationFrame(animRAF);
          animRAF = null;
        }
      }

      function animateTo(target) {
        cancelAnim();
        const start = position;
        const startTime = performance.now();
        const duration = 220;
        function step(now) {
          const t = Math.min(1, (now - startTime) / duration);
          const ease = 1 - Math.pow(1 - t, 3);
          position = start + (target - start) * ease;
          render();
          if (t < 1) {
            animRAF = requestAnimationFrame(step);
          } else {
            animRAF = null;
          }
        }
        animRAF = requestAnimationFrame(step);
      }

      function settle() {
        const idx = currentIndex();
        animateTo(idx * itemHeight);
        if (onSettle) onSettle(idx);
      }

      function startMomentum() {
        cancelAnim();
        let v = velocity;
        let lastTime = performance.now();
        function step(now) {
          const dt = Math.min(32, now - lastTime);
          lastTime = now;
          v *= Math.pow(0.94, dt / 16);
          const next = position - v * dt;
          position = clamp(next);
          render();
          if (Math.abs(v) > 0.02 && position > 0 && position < maxPos) {
            animRAF = requestAnimationFrame(step);
          } else {
            animRAF = null;
            settle();
          }
        }
        animRAF = requestAnimationFrame(step);
      }

      container.addEventListener('pointerdown', (e) => {
        dragging = true;
        cancelAnim();
        lastY = e.clientY;
        lastT = performance.now();
        velocity = 0;
        container.setPointerCapture(e.pointerId);
      });

      container.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const now = performance.now();
        const dy = e.clientY - lastY;
        const dt = Math.max(1, now - lastT);
        position = clamp(position - dy);
        velocity = dy / dt;
        lastY = e.clientY;
        lastT = now;
        scheduleRender();
      });

      function endDrag() {
        if (!dragging) return;
        dragging = false;
        if (Math.abs(velocity) > 0.05) {
          startMomentum();
        } else {
          settle();
        }
      }
      container.addEventListener('pointerup', endDrag);
      container.addEventListener('pointerleave', () => { if (dragging) endDrag(); });

      container.addEventListener('wheel', (e) => {
        e.preventDefault();
        cancelAnim();
        position = clamp(position + e.deltaY);
        scheduleRender();
        if (wheelSettleTimer) clearTimeout(wheelSettleTimer);
        wheelSettleTimer = setTimeout(settle, 120);
      }, { passive: false });

      render();

      return {
        setValue(v) {
          cancelAnim();
          position = clamp(v * itemHeight);
          render();
        },
        getValue: currentIndex,
        disable() { container.classList.add('disabled'); },
        enable() { container.classList.remove('disabled'); }
      };
    }

    /* ===== 計時器 ===== */
    let tmDuration = { h: 0, m: 5, s: 0 };
    let tmTotal = tmDuration.h * 3600 + tmDuration.m * 60 + tmDuration.s;
    let tmRemaining = tmTotal;
    let tmRunning = false;
    let tmInterval = null;
    const tmPanel = document.getElementById('panel-timer');

    function tmRecalcTotal() {
      if (tmRunning) return;
      tmTotal = tmDuration.h * 3600 + tmDuration.m * 60 + tmDuration.s;
      tmRemaining = tmTotal;
      renderTimerDisplay();
    }

    function renderTimerDisplay() {
      document.getElementById('tmDisplay').textContent = formatHMS(tmRemaining);
    }
    renderTimerDisplay();

    const tmWheelH = buildWheelColumn(document.getElementById('tmWheelH'), 23, tmDuration.h, (v) => { tmDuration.h = v; tmRecalcTotal(); });
    const tmWheelM = buildWheelColumn(document.getElementById('tmWheelM'), 59, tmDuration.m, (v) => { tmDuration.m = v; tmRecalcTotal(); });
    const tmWheelS = buildWheelColumn(document.getElementById('tmWheelS'), 59, tmDuration.s, (v) => { tmDuration.s = v; tmRecalcTotal(); });

    document.getElementById('tmStart').addEventListener('click', (e) => {
      tmRunning = !tmRunning;
      if (tmRunning) {
        e.target.textContent = '暫停';
        tmPanel.classList.add('running');
        tmInterval = setInterval(() => {
          tmRemaining -= 1;
          if (tmRemaining <= 0) {
            tmRemaining = 0;
            renderTimerDisplay();
            clearInterval(tmInterval);
            tmRunning = false;
            document.getElementById('tmStart').textContent = '開始';
            return;
          }
          renderTimerDisplay();
        }, 1000);
      } else {
        e.target.textContent = '開始';
        clearInterval(tmInterval);
      }
    });

    document.getElementById('tmReset').addEventListener('click', () => {
      tmRunning = false;
      clearInterval(tmInterval);
      tmPanel.classList.remove('running');
      tmTotal = tmDuration.h * 3600 + tmDuration.m * 60 + tmDuration.s;
      tmRemaining = tmTotal;
      renderTimerDisplay();
      document.getElementById('tmStart').textContent = '開始';
    });

    /* ===== 番茄鐘 ===== */
    let pmFocusDuration = { h: 0, m: 25, s: 0 };
    let pmBreakDuration = { h: 0, m: 5, s: 0 };
    let pmEditingMode = 'focus';
    let pmIsBreak = false;
    let pmRunning = false;
    let pmInterval = null;
    const pmPanel = document.getElementById('panel-pomodoro');

    function pmTotalSeconds(dur) {
      return dur.h * 3600 + dur.m * 60 + dur.s;
    }

    let pmRemaining = pmTotalSeconds(pmFocusDuration);

    function renderPomodoroDisplay() {
      document.getElementById('pmDisplay').textContent = formatHMS(pmRemaining);
      document.getElementById('pmMode').textContent = pmIsBreak ? '休息時間' : '專注時間';
    }
    renderPomodoroDisplay();

    const pmWheelH = buildWheelColumn(document.getElementById('pmWheelH'), 23, pmFocusDuration.h, (v) => {
      const dur = pmEditingMode === 'focus' ? pmFocusDuration : pmBreakDuration;
      dur.h = v;
      pmRecalcIfIdle();
    });
    const pmWheelM = buildWheelColumn(document.getElementById('pmWheelM'), 59, pmFocusDuration.m, (v) => {
      const dur = pmEditingMode === 'focus' ? pmFocusDuration : pmBreakDuration;
      dur.m = v;
      pmRecalcIfIdle();
    });
    const pmWheelS = buildWheelColumn(document.getElementById('pmWheelS'), 59, pmFocusDuration.s, (v) => {
      const dur = pmEditingMode === 'focus' ? pmFocusDuration : pmBreakDuration;
      dur.s = v;
      pmRecalcIfIdle();
    });

    function pmRecalcIfIdle() {
      if (pmRunning) return;
      const activeDur = pmIsBreak ? pmBreakDuration : pmFocusDuration;
      pmRemaining = pmTotalSeconds(activeDur);
      renderPomodoroDisplay();
    }

    document.querySelectorAll('.mode-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        if (pmRunning) return;
        pmEditingMode = tab.dataset.mode;
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t === tab));
        const dur = pmEditingMode === 'focus' ? pmFocusDuration : pmBreakDuration;
        pmWheelH.setValue(dur.h);
        pmWheelM.setValue(dur.m);
        pmWheelS.setValue(dur.s);
      });
    });

    document.getElementById('pmStart').addEventListener('click', (e) => {
      pmRunning = !pmRunning;
      if (pmRunning) {
        e.target.textContent = '暫停';
        pmPanel.classList.add('running');
        pmInterval = setInterval(() => {
          pmRemaining -= 1;
          if (pmRemaining <= 0) {
            pmIsBreak = !pmIsBreak;
            pmRemaining = pmTotalSeconds(pmIsBreak ? pmBreakDuration : pmFocusDuration);
          }
          renderPomodoroDisplay();
        }, 1000);
      } else {
        e.target.textContent = '開始';
        clearInterval(pmInterval);
      }
    });

    document.getElementById('pmReset').addEventListener('click', () => {
      pmRunning = false;
      clearInterval(pmInterval);
      pmPanel.classList.remove('running');
      pmIsBreak = false;
      pmRemaining = pmTotalSeconds(pmFocusDuration);
      renderPomodoroDisplay();
      document.getElementById('pmStart').textContent = '開始';
    });

    /* ===== 主題切換（櫻花） ===== */
    const themeOptions = document.querySelectorAll('.theme-option');
    const petalLayer = document.getElementById('petalLayer');
    let petalInterval = null;

    function spawnPetal() {
      const petal = document.createElement('div');
      petal.className = 'petal';
      const size = 8 + Math.random() * 10;
      const left = Math.random() * 100;
      const duration = 7 + Math.random() * 6;
      const delay = Math.random() * 0.5;
      const driftMid = (Math.random() * 60 - 30) + 'px';
      const driftEnd = (Math.random() * 80 - 40) + 'px';
      petal.style.left = left + 'vw';
      petal.style.width = size + 'px';
      petal.style.height = size + 'px';
      petal.style.animationDuration = duration + 's';
      petal.style.animationDelay = delay + 's';
      petal.style.setProperty('--drift-mid', driftMid);
      petal.style.setProperty('--drift-end', driftEnd);
      petalLayer.appendChild(petal);
      setTimeout(() => petal.remove(), (duration + delay) * 1000 + 200);
    }

    function startPetals() {
      if (petalInterval) return;
      spawnPetal();
      petalInterval = setInterval(spawnPetal, 400);
    }

    function stopPetals() {
      if (petalInterval) {
        clearInterval(petalInterval);
        petalInterval = null;
      }
      petalLayer.innerHTML = '';
    }

    const jungleLayer = document.getElementById('jungleLayer');
    let fireflyInterval = null;

    function spawnFirefly() {
      const fly = document.createElement('div');
      fly.className = 'firefly';
      const left = 10 + Math.random() * 80;
      const top = 20 + Math.random() * 70;
      const duration = 5 + Math.random() * 5;
      const delay = Math.random() * 1.5;
      const fxMid = (Math.random() * 50 - 25) + 'px';
      const fyMid = (Math.random() * -50 - 10) + 'px';
      const fxEnd = (Math.random() * 60 - 30) + 'px';
      const fyEnd = (Math.random() * -80 - 20) + 'px';
      fly.style.left = left + 'vw';
      fly.style.top = top + 'vh';
      fly.style.animationDuration = duration + 's';
      fly.style.animationDelay = delay + 's';
      fly.style.setProperty('--fx-mid', fxMid);
      fly.style.setProperty('--fy-mid', fyMid);
      fly.style.setProperty('--fx-end', fxEnd);
      fly.style.setProperty('--fy-end', fyEnd);
      jungleLayer.appendChild(fly);
      setTimeout(() => fly.remove(), (duration + delay) * 1000 + 200);
    }

    function startFireflies() {
      if (fireflyInterval) return;
      spawnFirefly();
      fireflyInterval = setInterval(spawnFirefly, 500);
    }

    function stopFireflies() {
      if (fireflyInterval) {
        clearInterval(fireflyInterval);
        fireflyInterval = null;
      }
      jungleLayer.querySelectorAll('.firefly').forEach(f => f.remove());
    }

    function applyTheme(theme) {
      if (theme === 'sakura') {
        document.body.dataset.theme = 'sakura';
        startPetals();
        stopFireflies();
      } else if (theme === 'jungle') {
        document.body.dataset.theme = 'jungle';
        startFireflies();
        stopPetals();
      } else {
        delete document.body.dataset.theme;
        stopPetals();
        stopFireflies();
      }
      themeOptions.forEach(opt => opt.classList.toggle('active', opt.dataset.theme === theme));
      try {
        localStorage.setItem('clockTheme', theme);
      } catch (e) {}
    }

    themeOptions.forEach(opt => {
      opt.addEventListener('click', () => {
        applyTheme(opt.dataset.theme);
        closeAllPanels();
      });
    });

    let savedTheme = 'default';
    try {
      savedTheme = localStorage.getItem('clockTheme') || 'default';
    } catch (e) {}
    applyTheme(savedTheme);
  </script>

</body>
